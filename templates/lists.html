<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ cache_buster }}">
    <style>
    .list {
      margin-right: 12px;
      margin-top: 6px;
    }
    </style>
    <title>Shopping Lists</title>
    <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}());</script>
  </head>
<body role="document">

  <ul class="nav nav-pills justify-content-center navbar bg-light">
    <li class="nav-item">
      <a class="nav-link active" href="#">Lists</a>
    </li>
    <li class="nav-item">
      <a class="nav-link disabled">Items</a>
    </li>
    <li><button id="theme-toggle" title="Toggle theme">🌙</button></li>
  </ul>

    <div class="container" role="main" style="margin-top: 42px">
      <div id="list-buttons">
        {% for list, is_multi_line, unprefixed_name in lists %}
            <button type="button" class="list btn btn-lg {% if is_multi_line %}btn-multi-line{% else %}btn-primary{% endif %}" data-listname="{{ list }}" {% if is_multi_line %}title="Multi-line mode enabled"{% endif %}>{{ unprefixed_name }}</button>&nbsp;
        {% endfor %}
        {% for folder_name, folder_lists in folders %}
            <button type="button" class="list btn btn-lg btn-folder" data-folder="{{ folder_name }}">📂 {{ folder_name }}</button>&nbsp;
            <div id="folder-{{ folder_name }}" class="folder-contents" style="display:none; margin-top: 8px; margin-bottom: 8px; padding: 8px 0 4px 16px; border-left: 3px solid #FFCB9A;">
              {% for list, is_multi_line, unprefixed_name in folder_lists %}
                  <button type="button" class="list btn btn-lg {% if is_multi_line %}btn-multi-line{% else %}btn-primary{% endif %}" data-listname="{{ list }}" data-folder="{{ folder_name }}" {% if is_multi_line %}title="Multi-line mode enabled"{% endif %}>{{ unprefixed_name }}</button>&nbsp;
              {% endfor %}
            </div>
        {% endfor %}
      </div>
    </div>

    <script type="text/javascript">
      (function() {
        var btn = document.getElementById('theme-toggle');
        if (document.documentElement.getAttribute('data-theme') === 'dark') btn.textContent = '☀️';
        btn.addEventListener('click', function() {
          var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            btn.textContent = '🌙';
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            btn.textContent = '☀️';
          }
        });
      }());

      window.addEventListener('load', () => {
        document.getElementById("list-buttons").onclick = (eventData) => {
          if (eventData.target.nodeName === "BUTTON") {
            const folderName = eventData.target.dataset.folder;
            const listName = eventData.target.dataset.listname;

            if (listName) {
              let url = `{{ base_url_path }}items/${encodeURIComponent(listName)}`;
              if (folderName) url += `?folder=${encodeURIComponent(folderName)}`;
              window.location = url;
              return false;
            }

            if (folderName) {
              const contentsDiv = document.getElementById('folder-' + folderName);
              if (contentsDiv) {
                contentsDiv.style.display = contentsDiv.style.display === 'none' ? 'block' : 'none';
              }
              return false;
            }
          }
          return;
        };
      });
    </script>
</body>
</html>
